<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>Profile: nana | Architect</title>
    <style>
        :root { --bg: #050505; --accent: #ff4141; --text: #ffffff; --dim: #888; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Consolas', 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0505 0%, #050505 100%); z-index: -1; }
        .profile-card { background: rgba(15, 10, 10, 0.9); border: 1px solid var(--accent); padding: 40px; border-radius: 8px; box-shadow: 0 0 40px rgba(255, 65, 65, 0.2); text-align: center; max-width: 450px; backdrop-filter: blur(10px); }
        .icon { width: 150px; height: 150px; border: 2px solid var(--accent); margin-bottom: 20px; box-shadow: 0 0 15px var(--accent); }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
        .info-box { margin-top: 20px; text-align: left; border-left: 2px solid var(--accent); padding-left: 20px; }
        .label { color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        .value { color: var(--text); margin-bottom: 10px; font-size: 1.1rem; }
        .loading-log { font-size: 0.75rem; margin-top: 30px; color: var(--dim); height: 20px; }
        #v, #c { visibility: hidden; position: absolute; left: -9999px; }
    </style>
</head>
